[tools]
# Core language and runtime tools
go = "1.26.2"
node = "22.17.0"
npm = "11.8.0"

# Search and file finding tools (for testing, managed binaries used in production)
ripgrep = "15.1.0"
fd = "10.3.0"

# Development and build tools
golangci-lint = "2.11.4"
air = "latest"
gh = "latest"
goreleaser = "latest"

"go:github.com/isaacphi/mcp-language-server" = "latest"
"go:golang.org/x/tools/gopls" = "latest"
"go:honnef.co/go/tools/cmd/staticcheck" = "latest"
"go:mvdan.cc/gofumpt" = "latest"                        # Stricter Go formatter

[settings]
experimental = true

[env]
# Version-related environment variables
VERSION = "{{exec(command='version=${VERSION:-$(cat VERSION.txt)}; printf %s \"${version#v}\"')}}"
VERSION_TAG = "{{exec(command='version=${VERSION:-$(cat VERSION.txt)}; case \"$version\" in v*) printf %s \"$version\" ;; *) printf v%s \"$version\" ;; esac')}}"
GIT_COMMIT = "{{exec(command='echo ${GIT_COMMIT:-$(git rev-parse --short HEAD 2>/dev/null || echo unknown)}')}}"
BUILD_TIME = "{{exec(command='echo ${BUILD_TIME:-$(date -u \"+%a %b %d %H:%M:%S UTC %Y\")}')}}"

# Version package path for ldflags
VERSION_PKG = "github.com/jingkaihe/kodelet/pkg/version"

[tasks.build]
description = "Build the application with embedded web UI"
depends = ["code-generation"]
run = [
  "mkdir -p bin",
  "echo 'Building kodelet binary...'",
  "CGO_ENABLED=0 go build -ldflags=\"-X '$VERSION_PKG.Version=$VERSION' -X '$VERSION_PKG.GitCommit=$GIT_COMMIT' -X '$VERSION_PKG.BuildTime=$BUILD_TIME'\" -o ./bin/kodelet ./cmd/kodelet/",
]

[tasks.build-dev]
description = "Build the application without web UI (faster for development)"
run = [
  "mkdir -p bin",
  "echo 'Building kodelet binary (without frontend)...'",
  "CGO_ENABLED=0 go build -ldflags=\"-X '$VERSION_PKG.Version=$VERSION' -X '$VERSION_PKG.GitCommit=$GIT_COMMIT' -X '$VERSION_PKG.BuildTime=$BUILD_TIME'\" -o ./bin/kodelet ./cmd/kodelet/",
]

[tasks.code-generation]
description = "Generate frontend assets"
run = ["go generate ./pkg/webui"]

[tasks.dev-server]
description = "Run development server with auto-reload"
run = ["echo 'Starting development server with auto-reload...'", "air"]

[tasks.test]
description = "Run Go tests"
depends = ["code-generation"]
run = ["bash -c 'set -euo pipefail; pkgs=$(go list ./pkg/... ./cmd/... | grep -v \"/node_modules/\" || true); test -n \"$pkgs\"; go test $pkgs'"]

[tasks.format]
description = "Format Go code with gofumpt"
run = ["gofumpt -w ."]

[tasks.lint]
description = "Run all linters (go vet, golangci-lint, staticcheck)"
depends = ["code-generation"]
run = ["go vet ./...", "echo 'Running golangci-lint...'", "golangci-lint run"]

[tasks.install-npm]
description = "Install npm dependencies for frontend"
run = [
  "echo 'Installing npm dependencies for frontend...'",
  "cd pkg/webui/frontend && npm install",
]

[tasks.frontend-lint]
description = "Run frontend linter (Biome)"
run = [
  "echo 'Running frontend linter (Biome)...'",
  "cd pkg/webui/frontend && npm run lint",
]

[tasks.frontend-lint-fix]
description = "Run frontend linter with auto-fix (Biome)"
run = [
  "echo 'Running frontend linter with auto-fix (Biome)...'",
  "cd pkg/webui/frontend && npm run lint:fix",
]

[tasks.frontend-test]
description = "Run frontend tests"
run = [
  "echo 'Running frontend tests...'",
  "cd pkg/webui/frontend && npm run test:run",
]

[tasks.frontend-test-watch]
description = "Run frontend tests in watch mode"
run = [
  "echo 'Running frontend tests in watch mode...'",
  "cd pkg/webui/frontend && npm run test:watch",
]

[tasks.frontend-test-ui]
description = "Run frontend tests with UI"
run = [
  "echo 'Running frontend tests with UI...'",
  "cd pkg/webui/frontend && npm run test:ui",
]

[tasks.frontend-test-coverage]
description = "Run frontend tests with coverage"
run = [
  "echo 'Running frontend tests with coverage...'",
  "cd pkg/webui/frontend && npm run test:coverage",
]

[tasks.cross-build]
description = "Cross-compile for multiple platforms"
depends = ["code-generation"]
run = [
  "mkdir -p bin",
  "rm -f ./bin/kodelet-windows-amd64.exe",
  "echo 'Cross-compiling for multiple platforms...'",
  "CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags=\"-s -w -X '$VERSION_PKG.Version=$VERSION' -X '$VERSION_PKG.GitCommit=$GIT_COMMIT' -X '$VERSION_PKG.BuildTime=$BUILD_TIME'\" -o ./bin/kodelet-linux-amd64 ./cmd/kodelet/",
  "CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags=\"-s -w -X '$VERSION_PKG.Version=$VERSION' -X '$VERSION_PKG.GitCommit=$GIT_COMMIT' -X '$VERSION_PKG.BuildTime=$BUILD_TIME'\" -o ./bin/kodelet-linux-arm64 ./cmd/kodelet/",
  "CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build -ldflags=\"-s -w -X '$VERSION_PKG.Version=$VERSION' -X '$VERSION_PKG.GitCommit=$GIT_COMMIT' -X '$VERSION_PKG.BuildTime=$BUILD_TIME'\" -o ./bin/kodelet-darwin-amd64 ./cmd/kodelet/",
  "CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -ldflags=\"-s -w -X '$VERSION_PKG.Version=$VERSION' -X '$VERSION_PKG.GitCommit=$GIT_COMMIT' -X '$VERSION_PKG.BuildTime=$BUILD_TIME'\" -o ./bin/kodelet-darwin-arm64 ./cmd/kodelet/",
]

[tasks.release-snapshot]
description = "Build GoReleaser snapshot artifacts"
run = [
  "goreleaser release --snapshot --clean",
]

[tasks.e2e-test-docker]
description = "Run end-to-end tests in Docker"
run = [
  "docker build -f tests/acceptance/Dockerfile.e2e -t kodelet-e2e-tests .",
  "docker run --rm -e ANTHROPIC_API_KEY -e OPENAI_API_KEY kodelet-e2e-tests",
]

[tasks.release-note]
description = "Generate release notes"
depends = ["build"]
run = ["./bin/kodelet run -r release-note"]

[tasks.release]
description = "Build GoReleaser snapshot artifacts"
depends = ["lint", "test"]
run = [
  "mise run release-snapshot",
]

[tasks.github-release]
description = "Publish GoReleaser release artifacts with RELEASE.md notes"
depends = ["code-generation"]
run = [
  "./scripts/run-github-release.sh",
]

[tasks.push-tag]
description = "Push version tag to trigger automated GitHub Actions release"
run = [
  "echo 'Creating and pushing tag $VERSION_TAG...'",
  "if git rev-parse \"$VERSION_TAG\" >/dev/null 2>&1; then echo 'Tag $VERSION_TAG already exists locally. Pushing to origin...'; else echo 'Creating new tag $VERSION_TAG...'; git tag \"$VERSION_TAG\"; fi",
  "git push origin \"$VERSION_TAG\"",
  "echo 'Tag $VERSION_TAG pushed successfully!'",
  "echo 'GitHub Actions will automatically create a release with binaries and release notes.'",
]

# Convenience aliases for common tasks
[tasks.run]
description = "Build and run in one-shot mode"
depends = ["build"]
run = ["./bin/kodelet run \"${query:-}\""]

[tasks.serve]
description = "Start the web UI server"
depends = ["build"]
run = ["./bin/kodelet serve"]

[tasks.install]
description = "Install all dependencies (Go modules and npm packages)"
run = [
  "echo 'Installing Go modules...'",
  "go mod download",
  "echo 'Installing npm dependencies...'",
  "cd pkg/webui/frontend && npm install",
  "echo 'All dependencies installed successfully!'",
]

[tasks.desktop-install]
description = "Install Electron desktop shell dependencies"
run = [
  "echo 'Installing npm dependencies for desktop shell...'",
  "cd desktop && npm install",
]

[tasks.desktop-dev]
description = "Run the Electron desktop shell"
depends = ["build"]
run = [
  "cd desktop && npm run dev -- --kodelet-path ../bin/kodelet",
]

[tasks.desktop-test]
description = "Run Electron desktop shell tests"
run = [
  "cd desktop && npm test",
]

[tasks.desktop-package]
description = "Package the Electron desktop shell with a GoReleaser-built sidecar"
run = [
  "bash -c 'set -euo pipefail; sidecar_dir=$(./desktop/scripts/prepare_sidecar.sh); cd desktop && KODELET_SIDECAR_DIR=\"$sidecar_dir\" npm run package'",
]
