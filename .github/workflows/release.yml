name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Create Release
    runs-on: kodelet-runner
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for proper version detection

      - name: Setup mise
        uses: jdx/mise-action@v2
        with:
          install: true
          cache: false # Tools cached on PVC at /home/runner/.local/share/mise
          experimental: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        run: mise run github-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  npm-release:
    name: Publish TypeScript SDK to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24.16.0'
          registry-url: 'https://registry.npmjs.org'
          cache: npm
          cache-dependency-path: sdk/package-lock.json

      - name: Setup npm for trusted publishing
        run: npm install -g npm@11.16.0

      - name: Install SDK dependencies
        run: npm ci
        working-directory: sdk

      - name: Set SDK version from VERSION.txt
        run: |
          version="$(sed 's/^v//' ../VERSION.txt)"
          npm version "$version" --no-git-tag-version --allow-same-version
          if [[ "$version" == *-* ]]; then
            tag="${version#*-}"
            tag="${tag%%.*}"
          else
            tag="latest"
          fi
          echo "NPM_PUBLISH_TAG=$tag" >> "$GITHUB_ENV"
        working-directory: sdk

      - name: Typecheck SDK
        run: npm run typecheck
        working-directory: sdk

      - name: Build SDK
        run: npm run build
        working-directory: sdk

      - name: Test SDK
        run: npm test
        working-directory: sdk

      - name: Publish SDK
        run: npm publish --provenance --tag "$NPM_PUBLISH_TAG"
        working-directory: sdk
