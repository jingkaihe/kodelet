name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Create Release
    runs-on: kodelet-runner
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for proper version detection

      - name: Setup mise
        uses: jdx/mise-action@v2
        with:
          install: true
          cache: false # Tools cached on PVC at /home/runner/.local/share/mise
          experimental: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        run: mise run github-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
