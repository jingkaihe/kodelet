name: Test and Lint

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  test:
    name: Tests & Linting
    runs-on: kodelet-runner

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup mise
        uses: jdx/mise-action@v2
        with:
          install: true
          cache: false # Tools cached on PVC at /home/runner/.local/share/mise
          experimental: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: mise run install
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Code generation
        run: mise run code-generation

      - name: Lint Go code
        run: mise run lint

      - name: Test Go code
        run: mise run test

      - name: Lint frontend (Biome)
        run: mise run frontend-lint

      - name: Test frontend code
        run: mise run frontend-test

      - name: Verify build
        run: mise run build

      - name: Verify cross compilation
        run: mise run release-snapshot
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
