# Kodelet Sample Configuration File
# This file shows all available configuration options with example values

# Logging Configuration
# Log level for the application (panic, fatal, error, warn, info, debug, trace)
log_level: "info"

# Log format for the application (json, text, fmt)
log_format: "json"

# LLM Configuration
# Provider to use (anthropic or openai)
provider: "anthropic"

# Model to use for LLM interactions
model: "claude-sonnet-4-6"

# Maximum tokens for responses
max_tokens: 8192

# Maximum thinking budget for non-adaptive Claude models
# Adaptive Claude models ignore this and use reasoning_effort instead.
thinking_budget_tokens: 4048

# Weak model to use for less complex tasks
weak_model: "claude-haiku-4-5-20251001"

# Maximum tokens for weak model responses
weak_model_max_tokens: 8192

# Custom system prompt template file
# Supports Go templates and can include built-in sections, e.g.:
# {{include "templates/sections/behavior.tmpl" .}}
# {{include "templates/sections/tooling.tmpl" .}}
# {{include "templates/sections/context_runtime.tmpl" .}}
sysprompt: ""

# Arguments available to custom system prompt templates as .Args.<key>
# sysprompt_args:
#   project: "kodelet"
#   env: "dev"
sysprompt_args: {}

# Model aliases for easier reference
# Allows using short names instead of full model identifiers
aliases:
  sonnet-46: "claude-sonnet-4-6"
  haiku-45: "claude-haiku-4-5-20251001"
  opus-48: "claude-opus-4-8"

# Active profile selection (uncomment to activate a specific profile)
# profile: "anthropic"

# Profile definitions for different use cases
# Each profile can override any configuration setting
profiles:
  anthropic:
    model: "claude-opus-4-8"
    weak_model: "claude-sonnet-4-6"
    max_tokens: 64000
    weak_model_max_tokens: 8192
    reasoning_effort: "max"

  fast:
    model: "haiku-45"
    weak_model: "haiku-45"
    max_tokens: 4096
    weak_model_max_tokens: 4096
    thinking_budget_tokens: 2000

  openai:
    provider: "openai"
    model: "gpt-5.5"
    weak_model: "gpt-5.4-mini"
    max_tokens: 16000
    reasoning_effort: "xhigh"
    tool_mode: "patch"
    disable_fs_search_tools: true
    openai:
      platform: "copilot"
      api_mode: "responses"

  fireworks:
    provider: "openai"
    model: "accounts/fireworks/models/kimi-k2p5"
    weak_model: "accounts/fireworks/models/kimi-k2p5"
    max_tokens: 32768
    weak_model_max_tokens: 8192
    openai:
      manual_cache: true
      base_url: "https://api.fireworks.ai/inference/v1"
      api_key_env_var: "FIREWORK_API_KEY"
      pricing:
        accounts/fireworks/models/kimi-k2p5:
          input: 0.0000006         # $0.6 per million tokens
          cached_input: 0.0000001  # $0.1 per million tokens
          output: 0.000003         # $3 per million tokens
          context_window: 262000   # 262k tokens

  openai-responses:
    provider: "openai"
    model: "gpt-5.5"
    weak_model: "gpt-5.4-mini"
    max_tokens: 16000
    reasoning_effort: "xhigh"
    tool_mode: "patch"
    disable_fs_search_tools: true
    openai:
      api_mode: "responses"

  mix-n-match:
    provider: "anthropic"
    model: "sonnet-46"
    weak_model: "haiku-45"
    max_tokens: 16000
    # Use OpenAI subagent profile for cross-provider support
    subagent_args: "--profile openai-subagent"

  # Subagent profile for mix-n-match (cross-provider example)
  openai-subagent:
    provider: "openai"
    model: "o3"
    reasoning_effort: "high"
    tool_mode: "patch"
    disable_fs_search_tools: true

# OpenAI specific settings
# Reasoning effort for supported reasoning/adaptive models
# OpenAI: none, minimal, low, medium, high, xhigh
# Anthropic adaptive thinking: none, low, medium, high, xhigh, max
reasoning_effort: "medium"

# API Retry Configuration
# Controls retry behavior for API calls
# - Anthropic: Only 'attempts' is used (relies on SDK's built-in retry)
# - OpenAI: All fields are used (custom retry implementation)
retry:
  # Maximum number of retry attempts (default: 3)
  # Used by both Anthropic and OpenAI
  attempts: 3

  # Initial delay in milliseconds before first retry (default: 1000)
  # Used by OpenAI only
  initial_delay: 1000

  # Maximum delay in milliseconds between retries (default: 10000)
  # Used by OpenAI only
  max_delay: 10000

  # Backoff strategy: "fixed" or "exponential" (default: "exponential")
  # Used by OpenAI only
  backoff_type: "exponential"

# Security Configuration
# Command allow list for bash tool (empty means use default banned commands)
# When specified, only commands matching these patterns are allowed
# Supports wildcards: * matches any string
# Example patterns:
#   - "ls": exact match for ls command
#   - "ls *": ls with any arguments
#   - "npm *": any npm command
#   - "echo hello": exact echo hello command
allowed_commands: []
# allowed_commands:
#   - "ls *"
#   - "pwd"
#   - "echo *"
#   - "cat *"
#   - "grep *"
#   - "find *"
#   - "npm *"
#   - "yarn *"
#   - "git status"
#   - "git log *"

# Bash tool configuration
bash:
  # Maximum execution timeout for bash tool calls (default: 120s)
  timeout: 120s

# Domain Filtering Configuration
# Path to file containing allowed domains for web_fetch tool (one domain per line)
# Supports exact matches (github.com) and glob patterns (*.github.com)
# If the file doesn't exist or is empty, all domains are allowed
# Localhost addresses (127.0.0.1, localhost, etc.) are always allowed
allowed_domains_file: "~/.kodelet/allowed_domains.txt"

# Tool Configuration
# Tools allowed for main agent (empty means use defaults)
# Meta tools (grep_tool and glob_tool) are always enabled for basic functionality unless
# disable_fs_search_tools is set to true.
# Available tools: bash, apply_patch, file_read, file_write, file_edit, thinking, subagent, grep_tool,
#                  glob_tool, web_fetch, view_image
# Tool interaction mode.
# - full: standard tool access
# - patch: removes file_read, file_write, and file_edit from both main-agent and subagent
#   toolsets, and ensures apply_patch is available
tool_mode: full

# Disable built-in filesystem search tools (glob_tool and grep_tool).
# When enabled, the agent is instructed to use fd/rg via the bash tool instead.
# disable_fs_search_tools: true

# Conversation summary mode for persisted conversation titles.
# - llm: generate a short summary with the weak model
# - first_message: use the first user message directly
# This only affects short persisted conversation summaries/titles, not compact context generation.
# conversation_summary_mode: "first_message"

# Context-window utilization ratio that triggers automatic context compaction.
# The default is 0.8, meaning compact at 80% of the model context window.
# compact_ratio: 0.8

allowed_tools: []
# allowed_tools:
#   - "bash"
#   - "file_read"
#   - "file_write"
#   - "file_edit"
#   - "thinking"       # Always enabled (meta tool)
#   - "subagent"
#   - "grep_tool"      # Always enabled (meta tool)
#   - "glob_tool"      # Always enabled (meta tool)
#   - "web_fetch"
#   - "view_image"

# Example OpenAI configuration (uncomment to use)
# provider: "openai"
# model: "gpt-4.1"
# max_tokens: 8192
# weak_model: "gpt-4.1-mini"
# weak_model_max_tokens: 4096
# reasoning_effort: "medium"

# OpenAI-compatible API configuration
# Supports any OpenAI-compatible provider (Fireworks, Groq, Together AI, etc.)
openai:
  # Optional platform label used for built-in defaults/metadata (e.g., openai, codex, fireworks)
  # platform: "fireworks"

  # Custom endpoint/auth configuration
  # base_url: "https://api.fireworks.ai/inference/v1"  # Custom API endpoint
  # api_key_env_var: "FIREWORK_API_KEY"                # Environment variable name for API key (defaults to OPENAI_API_KEY)

  # Select which OpenAI API surface to use.
  # Kodelet's Responses API path keeps conversation state locally by replaying
  # input history with store: false and a stable prompt_cache_key, rather than
  # relying on previous_response_id/server-stored conversation state.
  # api_mode: "responses"

  # Optional request latency tier. Native OpenAI values are auto, default,
  # flex, priority, and scale. Kodelet also accepts fast as a Codex-friendly
  # alias that is sent upstream as priority.
  # service_tier: "fast"

  # Enable OpenAI's native Responses web_search tool when talking to the real
  # OpenAI platform. This stays off for OpenAI-compatible platforms and custom
  # base URLs that may not support the built-in tool.
  # enable_search: true

  # Use the Responses API WebSocket transport when supported to reduce end-to-end
  # latency. Defaults to true for OpenAI/Codex Responses API calls; Kodelet still
  # sends store: false. Set this to false to force HTTP streaming.
  # websocket_mode: true

  # Enable manual prompt-cache affinity for Chat Completions.
  # When true, kodelet adds x-session-affinity header per conversation,
  # but only on calls where prompt caching is requested.
  # manual_cache: true

  # models:
  #   # Models that support reasoning capabilities
  #   reasoning:
  #     - "accounts/fireworks/models/kimi-k2p5"
  #   # Non-reasoning models (auto-populated if not specified)
  #   non_reasoning:
  #     - "accounts/fireworks/models/llama-v3p1-8b-instruct"
  # pricing:
  #   accounts/fireworks/models/kimi-k2p5:
  #     input: 0.0000006         # $0.6 per million tokens
  #     cached_input: 0.0000001  # $0.1 per million tokens
  #     output: 0.000003         # $3 per million tokens
  #     context_window: 262000   # 262k tokens
  #   # Optional long-context pricing fields are applied after the threshold.
  #   gpt-5.4:
  #     input: 0.0000025                    # $2.50 per million tokens
  #     cached_input: 0.00000025            # $0.25 per million tokens
  #     output: 0.000015                    # $15 per million tokens
  #     long_context_input: 0.000005        # $5 per million tokens
  #     long_context_cached_input: 0.0000005 # $0.50 per million tokens
  #     long_context_output: 0.0000225      # $22.50 per million tokens
  #     long_context_threshold: 272000      # >272k prompt tokens
  #     context_window: 1050000             # 1.05M tokens
  #   # ... additional models

# Subagent Configuration
# Subagents are spawned as separate processes using shell-out pattern.
# Configure subagent behavior using CLI arguments passed to the subprocess.
#
# subagent_args: CLI arguments to pass when spawning subagents
# Common patterns:
#   - "--use-weak-model"           # Use weak model (same provider as parent)
#   - "--profile cheap"            # Use a different profile
#   - "--profile openai-subagent"  # Use cross-provider profile
#
# Empty value means subagent uses default config (same as parent)
subagent_args: ""

# Example: Use weak model for subagents (cost optimization)
# subagent_args: "--use-weak-model"

# Example: Use a different profile for subagents (cross-provider)
# First define the profile, then reference it:
# profiles:
#   openai-subagent:
#     provider: "openai"
#     model: "gpt-4o-mini"
#     max_tokens: 2048
#     tool_mode: "patch"
#     disable_fs_search_tools: true
#
# subagent_args: "--profile openai-subagent"

# Example configurations for common scenarios:

# Scenario 1: Use weak model for subagents (same provider, cost optimization)
# subagent_args: "--use-weak-model"

# Scenario 2: Cross-provider subagents via profiles
# profiles:
#   cheap-openai:
#     provider: "openai"
#     model: "gpt-4o-mini"
#     max_tokens: 2048
#
# subagent_args: "--profile cheap-openai"

# Disable Subagent
# When set to true, the subagent tool is removed from available tools and
# subagent-related context is excluded from the system prompt.
# Other tools like web_fetch remain available.
# Can also be set via the --disable-subagent CLI flag or per-profile.
# disable_subagent: true
#
# Disable Filesystem Search Tools
# When set to true, glob_tool and grep_tool are removed from available tools.
# The system prompt will instruct the agent to use fd and rg via the bash tool instead.
# Can also be set via the --disable-fs-search-tools CLI flag or per-profile.
# disable_fs_search_tools: true
# Example: Profile with subagent disabled
# profiles:
#   no-subagent:
#     disable_subagent: true

# Extensions Configuration
# Kodelet can discover long-running extension executables from standalone
# directories plus plugin directories like ./.kodelet/plugins/<org@repo>/extensions
# and ~/.kodelet/plugins/<org@repo>/extensions.
extensions:
  # Enable/disable extension discovery (default: true)
  enabled: true

  # Global extension directory (default: ~/.kodelet/extensions)
  global_dir: "~/.kodelet/extensions"

  # Local extension directory (default: ./.kodelet/extensions)
  local_dir: "./.kodelet/extensions"

  # Maximum output size for extension tool output (default: 100KB)
  max_output_size: 102400

  # Optional allow/deny rules. Plugin extensions use org@repo/extension.
  # Standalone extensions use their directory path or executable path.
  # allow:
  #   - org@repo/weather
  #   - ./.kodelet/extensions/weather
  # deny:
  #   - org@repo/experimental

  # Per-tool runtime configuration. Tool names match extension-registered names.
  # Tool timeouts are controlled by SDK-declared timeoutInSec or the built-in 10m default.
  # tools:
  #   get_weather:
  #     enabled: true

  # Per-extension process environment. Extension subprocesses receive a
  # sanitized base environment; list extra variables here to pass literal
  # values or use null to inherit from Kodelet's environment.
  # processes:
  #   weather:
  #     env:
  #       WEATHER_API_KEY: null

# Agentic Skills Configuration
# Skills are model-invoked capabilities that package domain expertise
# Unlike fragments/recipes (user-invoked), skills are automatically invoked by Kodelet
# when relevant to the task. See docs/SKILLS.md for creating custom skills.
skills:
  # Enable/disable skills globally (default: true when not specified)
  # Set to false to completely disable the skills system
  enabled: true

  # Allowlist of skill names (empty = all discovered skills are available)
  # When specified, only these skills will be enabled
  # Skills are discovered from:
  #   - ./.kodelet/skills/<name>/SKILL.md (repository-local, higher precedence)
  #   - ~/.kodelet/skills/<name>/SKILL.md (user-global)
  # allowed:
  #   - pdf
  #   - xlsx
  #   - kubernetes

# Context File Discovery Configuration
# Controls which files are loaded as context for the agent.
# Context files provide project-specific instructions, coding conventions, and guidelines.
context:
  # List of filenames to search for in each directory (default: ["AGENTS.md"])
  # Files are searched in order; first match wins per directory.
  # Common options: AGENTS.md, CLAUDE.md, CODING.md, README.md
  patterns:
    - "AGENTS.md"
  # To also include README.md (not recommended for large READMEs):
  # patterns:
  #   - "AGENTS.md"
  #   - "README.md"

# Tracing Configuration
tracing:
  # Enable OpenTelemetry tracing (default: false)
  enabled: true

  # Sampling strategy (options: always, never, ratio)
  sampler: always

  # Sampling ratio when using ratio sampler (0.0-1.0)
  ratio: 1

# Environment variables can also be used to configure Kodelet:
# - KODELET_LOG_LEVEL: Overrides the log_level setting
# - KODELET_LOG_FORMAT: Overrides the log_format setting
# - KODELET_PROVIDER: Overrides the provider setting (anthropic, openai)
# - KODELET_MODEL: Overrides the model setting
# - KODELET_MAX_TOKENS: Overrides the max_tokens setting
# - KODELET_THINKING_BUDGET_TOKENS: Overrides the thinking_budget_tokens setting
# - KODELET_WEAK_MODEL: Overrides the weak_model setting
# - KODELET_WEAK_MODEL_MAX_TOKENS: Overrides the weak_model_max_tokens setting
# - KODELET_REASONING_EFFORT: Overrides the reasoning_effort setting (OpenAI)
# - KODELET_WEAK_REASONING_EFFORT: Overrides the weak_reasoning_effort setting (OpenAI)
# - KODELET_RETRY_ATTEMPTS: Overrides the retry.attempts setting
# - KODELET_RETRY_INITIAL_DELAY: Overrides the retry.initial_delay setting (milliseconds)
# - KODELET_RETRY_MAX_DELAY: Overrides the retry.max_delay setting (milliseconds)
# - KODELET_RETRY_BACKOFF_TYPE: Overrides the retry.backoff_type setting (fixed, exponential)
# - KODELET_ALLOWED_COMMANDS: Comma-separated list of allowed command patterns
# - KODELET_ALLOWED_TOOLS: Comma-separated list of allowed tools for main agent
# - KODELET_DISABLE_SUBAGENT: Disables the subagent tool and related system prompt context (true/false)
# - KODELET_CONTEXT_PATTERNS: Comma-separated list of context file patterns (e.g., "AGENTS.md,README.md")
# - KODELET_TRACING_ENABLED: Enables/disables tracing
# - KODELET_TRACING_SAMPLER: Sets the sampling strategy
# - KODELET_TRACING_RATIO: Sets the sampling ratio
# - KODELET_ALIASES_*: Define individual aliases (e.g., KODELET_ALIASES_SONNET46=claude-sonnet-4-6)
# - KODELET_OPENAI_API_MODE: OpenAI API mode (chat_completions or responses)
# - KODELET_OPENAI_WEBSOCKET_MODE: Use Responses API WebSocket mode when supported (true/false)
#
# API Keys:
# - ANTHROPIC_API_KEY: Required when using the Anthropic provider
# - OPENAI_API_KEY: Required when using the OpenAI provider (default)
# - OPENAI_API_BASE: Custom OpenAI API endpoint (overrides config base_url)
# Note: The API key environment variable can be customized using the api_key_env_var setting
#
# Standard OpenTelemetry environment variables are also supported:
# - OTEL_EXPORTER_OTLP_ENDPOINT: The endpoint to send telemetry data to
# - OTEL_EXPORTER_OTLP_HEADERS: Headers to use when sending telemetry data (for auth)
# - OTEL_RESOURCE_ATTRIBUTES: Additional resource attributes to include

# MCP (Model Context Protocol) Configuration
mcp:
  # Enable/disable MCP tools globally (default: true when not specified)
  # Set to false to completely disable MCP
  enabled: true

  # Execution mode for MCP tools
  # - "direct": Traditional direct tool calling (default)
  # - "code": Code execution with filesystem API (more efficient for multi-tool workflows)
  execution_mode: "direct"

  # Code execution settings (only used when execution_mode = "code")
  code_execution:
    # Directory where MCP tool TypeScript files are generated.
    # Default: ~/.kodelet/mcp/cache/<project-hash>
    # Set explicitly if you want repo-local generated files instead.
    workspace_dir: ""

    # Whether to regenerate tool files on startup
    regenerate_on_startup: false

    # RPC transport used by code_execution to call generated MCP wrappers.
    # - "unix": HTTP over a Unix socket (default)
    # - "http": HTTP on 127.0.0.1 with an ephemeral port and per-session bearer token
    rpc_transport: "unix"

    # Note: Socket path is now automatically generated per-session under
    # the OS temp directory (for example: /tmp/mcp-<session-hash>.sock)
    # to avoid Unix socket path length limits.

  # OAuth settings for remote HTTP/SSE MCP servers. OAuth is auto-detected
  # from HTTP 401 Bearer challenges and does not require an auth.type flag.
  oauth:
    # Allow browser-based OAuth when a remote MCP server requests it.
    # Set to "never" for headless/CI runs that should fail fast instead.
    interactive: "auto"

    # Attempt to open the default browser automatically. If false, Kodelet
    # prints the authorization URL for manual opening.
    open_browser: true

    # Maximum time to wait for the local OAuth callback.
    callback_timeout: "2m"

  # MCP servers configuration
  # Each server can be stdio, streamable HTTP, or deprecated SSE based
  servers:
    # Example stdio server (uncomment to enable)
    # filesystem:
    #   command: "npx"
    #   args: ["-y", "@modelcontextprotocol/server-filesystem", "/path/to/allowed/directory"]

    # Example streamable HTTP server (uncomment to enable)
    # example-http:
    #   server_type: "http"
    #   base_url: "https://example.com/mcp"
    #   # Optional static headers are still supported for API-key/bearer-token servers.
    #   headers:
    #     Authorization: "Bearer ${MCP_TOKEN}"
    #   # Optional OAuth hints for providers that need pre-registered clients or
    #   # non-standard discovery. These do not enable OAuth; OAuth is discovered
    #   # automatically from the server challenge.
    #   oauth:
    #     client_id: "${MCP_CLIENT_ID}"
    #     client_secret: "${MCP_CLIENT_SECRET}"
    #     scopes: ["mcp.read", "mcp.write"]
    #     redirect_uri: "http://127.0.0.1:1456/mcp/oauth/callback"
    #     auth_server_metadata_url: "https://auth.example.com/.well-known/oauth-authorization-server"
    #   tool_white_list: ["tool1", "tool2"]

    # Example deprecated SSE server (uncomment to enable)
    # example-sse:
    #   server_type: "sse"
    #   base_url: "https://example.com/sse"
    #   headers:
    #     Authorization: "Bearer ${MCP_TOKEN}"
    #   tool_white_list: ["tool1", "tool2"]
